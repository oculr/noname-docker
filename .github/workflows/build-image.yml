name: Auto Build and Push to GHCR

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时检查一次官方是否有新版本
  workflow_dispatch:     # 允许你在 GitHub Actions 页面手动点击运行

env:
  REGISTRY: ghcr.io
  # 自动获取你的 GitHub 用户名/仓库名作为镜像名 (例如: ghcr.io/username/repo)
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须赋予写入 GHCR 仓库的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 核心步骤：去官方仓库抓取最新的 Release 版本号（去掉开头的 'v'）
      - name: Fetch Latest Release Version
        id: get_version
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/libnoname/noname/releases/latest | jq -r .tag_name)
          # 去掉版本号前面的 'v' (例如 v1.11.4.1 -> 1.11.4.1)
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $VERSION"

      # 登录到 GitHub Container Registry (ghcr.io)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 设置 Docker Buildx 环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 将版本号作为构建参数传入 Dockerfile
          build-args: |
            VERSION=${{ steps.get_version.outputs.version }}
          # 同时打上当前版本号标签和 latest 标签
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max